name: 🎯 功能建议
description: 为QQ群智能守护者插件提出新功能或改进建议
title: "[建议] "
labels: ["enhancement"]
assignees: [zcj-ui]
body:
  - type: markdown
    attributes:
      value: |
        ## 💡 欢迎提出功能建议

        QQ群智能守护者集 AI 审核、防刷屏、群管工具于一体，期待你的 idea 让它更强大 🚀

  - type: textarea
    id: suggestion
    attributes:
      label: 📝 建议描述
      description: 清晰描述你希望增加的的功能或改进
      placeholder: "例如：增加 GIF 帧级拆分审核..."
    validations:
      required: true

  - type: textarea
    id: scenario
    attributes:
      label: 🎬 使用场景
      description: 描述该功能会在什么场景下使用，解决什么问题
      placeholder: "例如：群里经常有人发多帧 GIF 表情包夹带违规内容，目前单帧 OCR 无法覆盖..."

  - type: textarea
    id: expected
    attributes:
      label: ✨ 预期行为
      description: 描述功能实现后应该如何工作
      placeholder: "用户发送 GIF 后，插件自动拆帧 → OCR → LLM 审核..."

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 替代方案（可选）
      description: 你考虑过的其他方案或临时解决办法

  - type: textarea
    id: context
    attributes:
      label: 📎 补充信息
      description: 截图、参考链接、示例消息等任何有助于理解的内容

  - type: markdown
    attributes:
      value: |
        > 🙏 感谢你的建议！提交后作者会在 7 天内评估可行性。
