<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Content-Security-Policy" content="img-src * data: blob:; default-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src *;" />
  <title>Group Guardian - QQ群智能守护者</title>
  <style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f2f5;--surface:#fff;--border:#e4e7ed;
  --text-primary:#1a1a2e;--text-secondary:#606266;--text-muted:#909399;
  --primary:#409eff;--primary-light:#ecf5ff;--primary-dark:#337ecc;
  --success:#67c23a;--success-light:#f0f9eb;
  --warning:#e6a23c;--warning-light:#fdf6ec;
  --danger:#f56c6c;--danger-light:#fef0f0;
  --info:#909399;--info-light:#f4f4f5;
  --sidebar-bg:#1a1a2e;--sidebar-text:#a0aec0;--sidebar-active:#fff;
  --radius:8px;--radius-lg:12px;
  --shadow:0 1px 3px rgba(0,0,0,.08);--shadow-lg:0 4px 12px rgba(0,0,0,.1);
  --qq-owner:#fa5151;--qq-admin:#409eff;--qq-member:#909399;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text-primary);line-height:1.5;font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;background:var(--sidebar-bg);display:flex;flex-direction:column;flex-shrink:0;transition:width .3s}
.sidebar-header{padding:20px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,.06)}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#7c3aed);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;flex-shrink:0}
.logo-text{display:flex;flex-direction:column;min-width:0}
.logo-title{color:#fff;font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.logo-ver{color:var(--sidebar-text);font-size:11px}
.sidebar-nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);color:var(--sidebar-text);text-decoration:none;cursor:pointer;transition:all .15s;font-size:13px;font-weight:500}
.nav-item:hover{background:rgba(255,255,255,.06);color:var(--sidebar-active)}
.nav-item.active{background:rgba(64,158,255,.15);color:var(--primary)}
.nav-icon{width:18px;height:18px;fill:currentColor;flex-shrink:0}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--success);flex-shrink:0;animation:pulse 2s infinite}
.status-text{color:var(--sidebar-text);font-size:11px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.main-content{flex:1;overflow-y:auto;padding:24px 28px;min-width:0}
.page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.page-header h1{font-size:20px;font-weight:700}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px}
.stat-card{background:var(--surface);border-radius:var(--radius-lg);padding:16px 18px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);transition:transform .15s,box-shadow .15s}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-icon svg{width:22px;height:22px;fill:#fff}
.stat-primary .stat-icon{background:linear-gradient(135deg,#f56c6c,#e6a23c)}
.stat-info .stat-icon{background:linear-gradient(135deg,#409eff,#7c3aed)}
.stat-success .stat-icon{background:linear-gradient(135deg,#67c23a,#409eff)}
.stat-warning .stat-icon{background:linear-gradient(135deg,#e6a23c,#f56c6c)}
.stat-card:not(.stat-primary):not(.stat-info):not(.stat-success):not(.stat-warning) .stat-icon{background:linear-gradient(135deg,#909399,#c0c4cc)}
.stat-body{min-width:0}
.stat-value{font-size:24px;font-weight:800;line-height:1.2}
.stat-label{font-size:12px;color:var(--text-muted);margin-top:2px}
.card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden}
.card-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border)}
.card-header h2{font-size:15px;font-weight:600}
.card-full{grid-column:1/-1}
.header-actions{display:flex;gap:8px;align-items:center}
.btn{border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-sm{padding:5px 12px}
.btn-ghost{background:transparent;color:var(--text-secondary);padding:5px 10px}
.btn-ghost:hover{background:var(--info-light)}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-danger{background:var(--danger-light);color:var(--danger)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-secondary)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.input-sm{border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:13px;outline:none;transition:border-color .15s;width:180px}
.input-sm:focus{border-color:var(--primary)}
.input-md{border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:13px;outline:none;transition:border-color .15s;width:100%}
.input-md:focus{border-color:var(--primary)}
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:16px}
.group-card{border:1px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;gap:12px;align-items:center;cursor:pointer;transition:all .15s}
.group-card:hover{border-color:var(--primary);box-shadow:0 2px 8px rgba(64,158,255,.12)}
.group-card.is-white{border-left:3px solid var(--success)}
.group-card.is-black{border-left:3px solid var(--danger)}
.group-avatar{width:48px;height:48px;border-radius:var(--radius);object-fit:cover;flex-shrink:0;background:var(--info-light)}
.group-info{flex:1;min-width:0}
.group-name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.group-meta{display:flex;gap:8px;align-items:center;margin-top:4px;flex-wrap:wrap}
.group-id{font-size:11px;color:var(--text-muted);font-family:monospace}
.group-members{font-size:11px;color:var(--text-secondary)}
.group-badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.badge-white{background:var(--success-light);color:var(--success)}
.badge-black{background:var(--danger-light);color:var(--danger)}
.badge-blocked{background:var(--warning-light);color:var(--warning);font-weight:700}
.group-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.member-panel-title{display:flex;align-items:center;gap:8px}
.member-stats{display:flex;gap:16px;padding:12px 18px;border-bottom:1px solid var(--border);font-size:12px;color:var(--text-secondary)}
.member-stats .ms-item{display:flex;align-items:center;gap:4px}
.member-stats .ms-dot{width:8px;height:8px;border-radius:50%}
.ms-dot.owner{background:var(--qq-owner)}
.ms-dot.admin{background:var(--qq-admin)}
.ms-dot.member{background:var(--qq-member)}
.member-list{max-height:500px;overflow-y:auto;padding:8px}
.member-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;transition:background .1s}
.member-item:hover{background:var(--info-light)}
.member-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--info-light)}
.member-name{font-size:13px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-role{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;flex-shrink:0}
.role-owner{background:rgba(250,81,81,.1);color:var(--qq-owner)}
.role-admin{background:rgba(64,158,255,.1);color:var(--qq-admin)}
.role-member{background:rgba(144,147,153,.1);color:var(--qq-member)}
.member-title{font-size:10px;padding:1px 6px;border-radius:4px;background:linear-gradient(135deg,#ff9a56,#fa5151);color:#fff;flex-shrink:0;max-width:80px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.member-uid{font-size:11px;color:var(--text-muted);font-family:monospace;flex-shrink:0}
.member-actions{flex-shrink:0}
.admin-manage{padding:16px}
.admin-add-row{display:flex;gap:8px;margin-bottom:12px}
.admin-list{display:flex;flex-wrap:wrap;gap:8px}
.admin-tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:16px;background:var(--primary-light);color:var(--primary);font-size:12px;font-weight:500}
.admin-tag .btn-remove{cursor:pointer;font-size:14px;opacity:.6;transition:opacity .15s;background:none;border:none;color:inherit;padding:0;line-height:1}
.admin-tag .btn-remove:hover{opacity:1}
.ranking-container{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px}
.ranking-section h3{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text-secondary)}
.ranking-list{max-height:300px;overflow-y:auto}
.ranking-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ranking-item:last-child{border-bottom:none}
.ranking-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.ranking-num.top1{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#fff}
.ranking-num.top2{background:linear-gradient(135deg,#c0c0c0,#a0a0a0);color:#fff}
.ranking-num.top3{background:linear-gradient(135deg,#cd7f32,#b87333);color:#fff}
.ranking-num.normal{background:var(--info-light);color:var(--text-secondary)}
.ranking-name{flex:1;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ranking-count{font-size:14px;font-weight:700;color:var(--danger);flex-shrink:0}
.user-container{max-height:500px;overflow-y:auto;padding:12px}
.user-card{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden}
.user-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(--surface);transition:background .1s}
.user-header:hover{background:var(--primary-light)}
.user-check{flex-shrink:0;cursor:pointer}
.user-check input{width:15px;height:15px;cursor:pointer;accent-color:var(--primary)}
.user-info{flex:1;min-width:0;display:flex;align-items:center;gap:6px}
.user-name{font-weight:600;font-size:13px}
.user-uid{font-size:11px;color:var(--text-muted);font-family:monospace}
.user-meta{display:flex;gap:10px;align-items:center;flex-shrink:0}
.user-group{font-size:10px;color:var(--text-muted);background:var(--info-light);padding:2px 6px;border-radius:4px}
.user-count{font-size:13px;font-weight:700;color:var(--danger)}
.user-time{font-size:10px;color:var(--text-muted);white-space:nowrap}
.expand-icon{font-size:9px;color:var(--text-muted);transition:transform .2s;flex-shrink:0}
.expand-icon.expanded{transform:rotate(90deg)}
.user-records{border-top:1px solid var(--border);background:var(--surface);display:none}
.record-table{width:100%;border-collapse:collapse;font-size:12px}
.record-table th{background:var(--info-light);padding:6px 10px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:1px solid var(--border);white-space:nowrap}
.record-table td{padding:6px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.record-table tr:hover td{background:var(--primary-light)}
.log-container{overflow-x:auto;padding:12px}
.log-table{width:100%;border-collapse:collapse;font-size:12px}
.log-table th{background:var(--info-light);padding:8px 10px;text-align:left;font-weight:600;color:var(--text-secondary);border-bottom:1px solid var(--border);white-space:nowrap}
.log-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.log-table tr:hover td{background:var(--primary-light)}
.msg-cell{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.reason-cell{max-width:150px;font-size:11px;color:var(--text-muted)}
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;white-space:nowrap}
.badge-danger{background:var(--danger-light);color:var(--danger)}
.badge-success{background:var(--success-light);color:var(--success)}
.badge-warning{background:var(--warning-light);color:var(--warning)}
.badge-default{background:var(--info-light);color:var(--text-muted)}
.settings-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.settings-list{padding:8px 16px}
.setting-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.setting-item:last-child{border-bottom:none}
.setting-info{flex:1;min-width:0}
.setting-label{font-size:13px;font-weight:500}
.setting-desc{font-size:11px;color:var(--text-muted);margin-top:2px}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:#ccc;border-radius:22px;transition:.2s;cursor:pointer}
.toggle .slider::before{content:"";position:absolute;width:16px;height:16px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.slider{background:var(--primary)}
.toggle input:checked+.slider::before{transform:translateX(18px)}
.list-manage{padding:16px}
.list-section{margin-bottom:20px}
.list-section:last-child{margin-bottom:0}
.list-section h3{font-size:13px;font-weight:600;margin-bottom:8px}
.list-add-row{display:flex;gap:8px;margin-bottom:8px}
.list-items{display:flex;flex-wrap:wrap;gap:6px}
.list-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:14px;font-size:12px;font-weight:500}
.list-tag .btn-remove{cursor:pointer;font-size:13px;opacity:.6;transition:opacity .15s;background:none;border:none;color:inherit;padding:0;line-height:1}
.list-tag .btn-remove:hover{opacity:1}
.list-tag-white{background:var(--success-light);color:var(--success)}
.list-tag-black{background:var(--danger-light);color:var(--danger)}
.list-tag-user{background:var(--warning-light);color:var(--warning)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:480px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg)}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}
.modal-header h3{font-size:15px;font-weight:600}
.btn-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);padding:0 4px}
.btn-close:hover{color:var(--text-primary)}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.toast-container{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;box-shadow:var(--shadow-lg);animation:slideIn .3s;min-width:200px}
.toast-success{background:var(--success);color:#fff}
.toast-error{background:var(--danger);color:#fff}
.toast-info{background:var(--primary);color:#fff}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.empty{text-align:center;color:var(--text-muted);padding:24px 0;font-size:13px}
@media(max-width:900px){
  .sidebar{width:60px}
  .sidebar-header .logo-text,.nav-item span,.sidebar-footer .status-text{display:none}
  .sidebar-header{justify-content:center;padding:16px 8px}
  .nav-item{justify-content:center;padding:10px}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .settings-grid{grid-template-columns:1fr}
  .ranking-container{grid-template-columns:1fr}
  .group-grid{grid-template-columns:1fr}
  .main-content{padding:16px}
}
@media(max-width:600px){
  .sidebar{display:none}
  .stats-row{grid-template-columns:1fr}
}
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-icon">G</div>
        <div class="logo-text">
          <span class="logo-title">Group Guardian</span>
          <span class="logo-ver" id="logoVer">v1.8.2</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" data-tab="overview">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
          <span>总览</span>
        </a>
        <a class="nav-item" data-tab="groups">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
          <span>群管理</span>
        </a>
        <a class="nav-item" data-tab="records">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
          <span>违规记录</span>
        </a>
        <a class="nav-item" data-tab="settings">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
          <span>设置</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">连接中...</span>
      </div>
    </aside>

    <main class="main-content">
      <div class="tab-panel active" id="tab-overview">
        <div class="page-header">
          <h1>总览</h1>
          <button class="btn btn-ghost" id="btnRefreshAll">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            刷新
          </button>
        </div>
        <div class="stats-row" id="statsRow">
          <div class="stat-card stat-primary">
            <div class="stat-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div>

          <div class="card"><div class="card-header"><h2>核心设置</h2></div><div class="settings-list" id="settingsCore"></div></div>
          <div class="card"><div class="card-header"><h2>审核设置</h2></div><div class="settings-list" id="settingsAudit"></div></div>
          <div class="card"><div class="card-header"><h2>词库设置</h2></div><div class="settings-list" id="settingsLexicon"></div></div>
          <div class="card"><div class="card-header"><h2>功能开关</h2></div><div class="settings-list" id="settingsFeatures"></div></div>
          <div class="card card-full"><div class="card-header"><h2>高级设置</h2></div><div class="settings-list" id="settingsExtra"></div></div>

  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal" id="modal">
      <div class="modal-header"><h3 id="modalTitle">标题</h3><button class="btn-close" id="btnModalClose">&times;</button></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>
  <div class="toast-container" id="toastContainer"></div>

  <script src="/api/plugin/page/bridge-sdk.js"></script>
  <script>
var bridge = null;
var apiGet = null;
var apiPost = null;
let CONFIG = {};
let CURRENT_GROUP = null;
let CURRENT_MEMBERS = [];
let CACHED_GROUP_ID = null;

function $(sel, ctx) { ctx = ctx || document; return ctx.querySelector(sel); }
function $$(sel, ctx) { ctx = ctx || document; return [].slice.call(ctx.querySelectorAll(sel)); }

function toast(msg, type) {
  type = type || 'info';
  var c = $('#toastContainer');
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; t.style.transform = 'translateX(40px)'; setTimeout(function() { t.remove(); }, 300); }, 2500);
}

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function fmtTime(ts) {
  if (!ts) return '';
  var d = new Date(ts * 1000);
  var p = function(n) { return String(n).replace(/^\d$/, '0' + n); };
  return p(d.getMonth() + 1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
}

var ROLE_NAME = { owner: '群主', admin: '管理员', member: '成员' };

async function safeGet(path, params) {
  try {
    var r = await apiGet(path, params);
    if (typeof r === 'string') { try { r = JSON.parse(r); } catch(e2) {} }
    return r;
  } catch(e) {
    console.error('[safeGet]', path, e);
    return { status: 'error', message: String(e) };
  }
}
async function safePost(path, body) {
  try {
    var r = await apiPost(path, body);
    if (typeof r === 'string') { try { r = JSON.parse(r); } catch(e2) {} }
    return r;
  } catch(e) {
    console.error('[safePost]', path, e);
    return { status: 'error', message: String(e) };
  }
}

function showModal(title, bodyHtml, footerHtml) {
  footerHtml = footerHtml || '';
  $('#modalTitle').textContent = title;
  $('#modalBody').innerHTML = bodyHtml;
  $('#modalFooter').innerHTML = footerHtml;
  $('#modalOverlay').style.display = 'flex';
}
function closeModal() { $('#modalOverlay').style.display = 'none'; }

function initTabs() {
  $$('.nav-item').forEach(function(item) {
    item.addEventListener('click', function() {
      $$('.nav-item').forEach(function(i) { i.classList.remove('active'); });
      $$('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      item.classList.add('active');
      $('#tab-' + item.dataset.tab).classList.add('active');
      if (item.dataset.tab === 'overview') loadOverview();
      if (item.dataset.tab === 'groups') {
        $('#memberPanel').style.display = 'none';
        var groupCard = $('#groupGrid');
        if (groupCard) groupCard = groupCard.closest('.card');
        if (groupCard) groupCard.style.display = '';
        CURRENT_GROUP = null;
        CACHED_GROUP_ID = null;
        CURRENT_MEMBERS = [];
        loadGroups();
        loadAdmins();
      }
      if (item.dataset.tab === 'records') { loadUsers(); loadLogs(); }
      if (item.dataset.tab === 'settings') loadSettings();
    });
  });
}

async function loadOverview() {
  var res = await safeGet('stats');
  var todayRes = await safeGet('today_stats');
  var d = res;
  if (d && d.status === 'error') { d = null; }
  if (d) {
    $('#statTodayBlocked').textContent = d.today_blocked != null ? d.today_blocked : '--';
    $('#statTodayTotal').textContent = d.today_total != null ? d.today_total : '--';
    $('#statTodayPassed').textContent = d.today_passed != null ? d.today_passed : '--';
    $('#statWhiteCount').textContent = d.group_white_list_count != null ? d.group_white_list_count : '--';
    $('#statBlackCount').textContent = d.group_black_list_count != null ? d.group_black_list_count : '--';
    $('#statUserBlackCount').textContent = d.user_black_list_count != null ? d.user_black_list_count : '--';
    $('#statAdminCount').textContent = d.admin_list_count != null ? d.admin_list_count : '--';
    $('#statTotalLogs').textContent = d.total_logs != null ? d.total_logs : '--';
    $('#logoVer').textContent = d.version || 'v1.8.2';
  }
  if (todayRes && todayRes.status !== 'error') {
    renderRanking('groupRanking', todayRes.group_ranking, function(item) {
      return '<span class="ranking-name">群 ' + esc(item.group_id) + '</span><span class="ranking-count">' + item.count + '</span>';
    });
    renderRanking('userRanking', todayRes.user_ranking, function(item) {
      return '<span class="ranking-name">' + esc(item.user_name || item.user_id) + '</span><span class="ranking-count">' + item.count + '</span>';
    });
  }
}

function renderRanking(containerId, list, renderFn) {
  var c = $('#' + containerId);
  if (!list || !list.length) { c.innerHTML = '<p class="empty">暂无数据</p>'; return; }
  c.innerHTML = list.map(function(item, i) {
    var cls = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : 'normal';
    return '<div class="ranking-item"><div class="ranking-num ' + cls + '">' + (i + 1) + '</div>' + renderFn(item) + '</div>';
  }).join('');
}

async function loadGroups() {
  var grid = $('#groupGrid');
  grid.innerHTML = '<p class="empty">加载中...</p>';
  var res = await safeGet('groups');
  if (res && res.status === 'error') { grid.innerHTML = '<p class="empty">' + esc(res.message) + '</p>'; return; }
  CONFIG._groups = res;
  renderGroups(res);
}

function renderGroups(groups) {
  var grid = $('#groupGrid');
  var keyword = ($('#searchGroupInput') && $('#searchGroupInput').value || '').toLowerCase().trim();
  var filtered = groups;
  if (keyword) {
    filtered = groups.filter(function(g) { return g.group_id.indexOf(keyword) !== -1 || (g.group_name || '').toLowerCase().indexOf(keyword) !== -1; });
  }
  if (!filtered.length) { grid.innerHTML = '<p class="empty">未找到匹配的群</p>'; return; }
  grid.innerHTML = filtered.map(function(g) {
    var cls = g.is_white ? 'is-white' : g.is_black ? 'is-black' : '';
    var badges = [];
    if (g.is_white) badges.push('<span class="group-badge badge-white">白名单</span>');
    if (g.is_black) badges.push('<span class="group-badge badge-black">黑名单</span>');
    if (g.is_white && g.today_blocked > 0) badges.push('<span class="group-badge badge-blocked">今日拦截 ' + g.today_blocked + '</span>');
    var groupAvatarUrl = 'https://p.qlogo.cn/gh/' + g.group_id + '/' + g.group_id + '/';
    return '<div class="group-card ' + cls + '" data-gid="' + esc(g.group_id) + '">' +
      '<img class="group-avatar" src="' + groupAvatarUrl + '" onerror="this.src=\'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23e4e7ed%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 font-size=%2230%22 fill=%22%23909399%22%3EG%3C/text%3E%3C/svg%3E\'" />' +
      '<div class="group-info"><div class="group-name">' + esc(g.group_name || '未命名群') + '</div>' +
      '<div class="group-meta"><span class="group-id">' + esc(g.group_id) + '</span><span class="group-members">' + g.member_count + ' 人</span>' + badges.join('') + '</div></div>' +
      '<div class="group-actions">' +
        (g.is_white ? '<button class="btn btn-outline btn-sm" data-action="remove-white" data-gid="' + esc(g.group_id) + '">移出白名单</button>' : '<button class="btn btn-primary btn-sm" data-action="add-white" data-gid="' + esc(g.group_id) + '">加入白名单</button>') +
        (g.is_black ? '<button class="btn btn-outline btn-sm" data-action="remove-black" data-gid="' + esc(g.group_id) + '">移出黑名单</button>' : '<button class="btn btn-danger btn-sm" data-action="add-black" data-gid="' + esc(g.group_id) + '">加入黑名单</button>') +
      '</div></div>';
  }).join('');

  $$('.group-card', grid).forEach(function(card) {
    card.addEventListener('click', function(e) {
      if (e.target.closest('[data-action]')) return;
      openMemberPanel(card.dataset.gid);
    });
  });

  $$('[data-action]', grid).forEach(function(btn) {
    btn.addEventListener('click', async function(e) {
      e.stopPropagation();
      var action = btn.dataset.action;
      var gid = btn.dataset.gid;
      if (action === 'add-white') { await safePost('whitelist/add', { group_id: gid }); toast('已加入白名单', 'success'); }
      else if (action === 'remove-white') { await safePost('whitelist/remove', { group_id: gid }); toast('已移出白名单', 'success'); }
      else if (action === 'add-black') { await safePost('blacklist/add', { group_id: gid }); toast('已加入黑名单', 'danger'); }
      else if (action === 'remove-black') { await safePost('blacklist/remove', { group_id: gid }); toast('已移出黑名单', 'success'); }
      loadGroups();
    });
  });
}

async function openMemberPanel(gid) {
  CURRENT_GROUP = gid;
  var panel = $('#memberPanel');
  panel.style.display = 'block';
  $('#memberPanelTitle').textContent = '群 ' + gid + ' 成员';
  $('#memberList').innerHTML = '<p class="empty">加载中...</p>';
  var groupGrid = $('#groupGrid');
  if (groupGrid) { var card = groupGrid.closest('.card'); if (card) card.style.display = 'none'; }
  if (CACHED_GROUP_ID !== gid) {
    var res = await safeGet('group_members', { group_id: gid });
    if (res && res.status === 'error') { $('#memberList').innerHTML = '<p class="empty">' + esc(res.message) + '</p>'; return; }
    CURRENT_MEMBERS = res;
    CACHED_GROUP_ID = gid;
  }
  renderMembers(CURRENT_MEMBERS);
}

function renderMembers(members) {
  var keyword = ($('#searchMemberInput') && $('#searchMemberInput').value || '').toLowerCase().trim();
  var filtered = members;
  if (keyword) {
    filtered = members.filter(function(m) { return (m.display_name || '').toLowerCase().indexOf(keyword) !== -1 || m.user_id.indexOf(keyword) !== -1; });
  }
  var ownerCount = filtered.filter(function(m) { return m.role === 'owner'; }).length;
  var adminCount = filtered.filter(function(m) { return m.role === 'admin'; }).length;
  $('#memberStats').innerHTML =
    '<span class="ms-item"><span class="ms-dot owner"></span> 群主 ' + ownerCount + '</span>' +
    '<span class="ms-item"><span class="ms-dot admin"></span> 管理员 ' + adminCount + '</span>' +
    '<span class="ms-item"><span class="ms-dot member"></span> 成员 ' + (filtered.length - ownerCount - adminCount) + '</span>' +
    '<span class="ms-item">共 ' + filtered.length + ' 人</span>';
  $('#memberList').innerHTML = filtered.map(function(m) {
    var roleName = ROLE_NAME[m.role] || m.role;
    var roleCls = m.role === 'owner' ? 'role-owner' : m.role === 'admin' ? 'role-admin' : 'role-member';
    var titleHtml = m.title ? '<span class="member-title" title="' + esc(m.title) + '">' + esc(m.title) + '</span>' : '';
    var adminBtn = m.is_plugin_admin
      ? '<button class="btn btn-outline btn-sm" data-action="remove-admin" data-uid="' + esc(m.user_id) + '">移除管理</button>'
      : '<button class="btn btn-primary btn-sm" data-action="add-admin" data-uid="' + esc(m.user_id) + '">设为管理</button>';
    var memberAvatarUrl = 'https://q.qlogo.cn/headimg_dl?dst_uin=' + m.user_id + '&spec=640';
    return '<div class="member-item">' +
      '<img class="member-avatar" src="' + memberAvatarUrl + '" onerror="this.src=\'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23e4e7ed%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 font-size=%2228%22 fill=%22%23909399%22%3E?%3C/text%3E%3C/svg%3E\'" />' +
      '<span class="member-name">' + esc(m.display_name) + '</span>' +
      '<span class="member-role ' + roleCls + '">' + roleName + '</span>' + titleHtml +
      '<span class="member-uid">' + esc(m.user_id) + '</span>' +
      '<span class="member-actions">' + adminBtn + '</span></div>';
  }).join('');

  $$('[data-action="add-admin"]', $('#memberList')).forEach(function(btn) {
    btn.addEventListener('click', async function() {
      await safePost('admin/add', { user_id: btn.dataset.uid });
      toast('已添加为管理员', 'success');
      CACHED_GROUP_ID = null;
      openMemberPanel(CURRENT_GROUP);
    });
  });
  $$('[data-action="remove-admin"]', $('#memberList')).forEach(function(btn) {
    btn.addEventListener('click', async function() {
      await safePost('admin/remove', { user_id: btn.dataset.uid });
      toast('已移除管理员', 'success');
      CACHED_GROUP_ID = null;
      openMemberPanel(CURRENT_GROUP);
    });
  });
}

async function loadAdmins() {
  var res = await safeGet('config');
  if (res && res.status === 'error') return;
  CONFIG = Object.assign({}, CONFIG, res);
  renderAdmins();
}

function renderAdmins() {
  var admins = CONFIG._admin_list || CONFIG.admin_list || [];
  var c = $('#adminList');
  if (!admins.length) { c.innerHTML = '<p class="empty">暂无管理员</p>'; return; }
  c.innerHTML = admins.map(function(uid) {
    return '<span class="admin-tag">' + esc(String(uid)) + '<button class="btn-remove" data-uid="' + esc(String(uid)) + '">&times;</button></span>';
  }).join('');
  $$('.btn-remove', c).forEach(function(btn) {
    btn.addEventListener('click', async function() {
      await safePost('admin/remove', { user_id: btn.dataset.uid });
      toast('已移除管理员', 'success');
      loadAdmins();
    });
  });
}

async function loadUsers() {
  var c = $('#userContainer');
  c.innerHTML = '<p class="empty">加载中...</p>';
  var res = await safeGet('moderation_users');
  if (res && res.status === 'error') { c.innerHTML = '<p class="empty">' + esc(res.message) + '</p>'; return; }
  renderUsers(res);
}

function renderUsers(users) {
  var c = $('#userContainer');
  if (!users || !users.length) { c.innerHTML = '<p class="empty">暂无数据</p>'; return; }
  c.innerHTML = users.map(function(u) {
    var groups = [];
    u.records.forEach(function(r) { if (r.group_id && groups.indexOf(r.group_id) === -1) groups.push(r.group_id); });
    var groupStr = groups.slice(0, 2).join(', ') + (groups.length > 2 ? '...' : '');
    var latest = u.records[u.records.length - 1];
    return '<div class="user-card" data-uid="' + esc(u.user_id) + '">' +
      '<div class="user-header">' +
        '<label class="user-check"><input type="checkbox" class="ck" data-uid="' + esc(u.user_id) + '" /></label>' +
        '<div class="user-info"><span class="user-name">' + esc(u.user_name) + '</span><span class="user-uid">' + esc(u.user_id) + '</span></div>' +
        '<div class="user-meta"><span class="user-group">' + esc(groupStr) + '</span><span class="user-count">' + u.count + '次</span><span class="user-time">' + fmtTime(latest.ts) + '</span><span class="expand-icon">&#9654;</span></div>' +
      '</div>' +
      '<div class="user-records">' +
        '<table class="record-table"><thead><tr><th>时间</th><th>群</th><th>消息</th><th>原因</th><th>操作</th></tr></thead><tbody>' +
        u.records.map(function(r) {
          return '<tr><td>' + fmtTime(r.ts) + '</td><td>' + esc(r.group_id) + '</td><td title="' + esc(r.msg_preview) + '">' + esc((r.msg_preview || '').slice(0, 30)) + '</td><td>' + esc((r.reason || '').slice(0, 20)) + '</td><td><button class="btn btn-danger btn-sm" data-del="' + esc(r.id) + '">删除</button></td></tr>';
        }).join('') + '</tbody></table></div></div>';
  }).join('');

  $$('.user-header', c).forEach(function(h) {
    h.addEventListener('click', function(e) {
      if (e.target.closest('.user-check') || e.target.closest('.ck')) return;
      var icon = $('.expand-icon', h);
      var rec = h.nextElementSibling;
      icon.classList.toggle('expanded');
      rec.style.display = rec.style.display === 'block' ? 'none' : 'block';
    });
  });

  $$('[data-del]', c).forEach(function(btn) {
    btn.addEventListener('click', async function() {
      await safePost('logs/delete', { ids: [btn.dataset.del] });
      toast('已删除', 'success');
      loadUsers();
    });
  });
}

async function loadLogs() {
  var c = $('#logContainer');
  c.innerHTML = '<p class="empty">加载中...</p>';
  var res = await safeGet('logs');
  if (res && res.status === 'error') { c.innerHTML = '<p class="empty">' + esc(res.message) + '</p>'; return; }
  var logs = res || [];
  if (!logs.length) { c.innerHTML = '<p class="empty">暂无日志</p>'; return; }
  var rows = logs.slice(0, 100).map(function(l) {
    var a = l.action || '';
    var cls = a.indexOf('撤回') !== -1 ? 'badge-danger' : a.indexOf('放行') !== -1 ? 'badge-success' : a.indexOf('提醒') !== -1 ? 'badge-warning' : 'badge-default';
    return '<tr><td>' + fmtTime(l.ts) + '</td><td>' + esc(l.group_id) + '</td><td>' + esc(l.user_name) + '<br><span style="font-size:10px;color:#909399">' + esc(l.user_id) + '</span></td><td class="msg-cell" title="' + esc(l.msg_preview) + '">' + esc(l.msg_preview) + '</td><td><span class="badge ' + cls + '">' + esc(a) + '</span></td><td class="reason-cell" title="' + esc(l.reason) + '">' + esc((l.reason || '').slice(0, 30)) + '</td></tr>';
  }).join('');
  c.innerHTML = '<table class="log-table"><thead><tr><th>时间</th><th>群号</th><th>用户</th><th>消息</th><th>操作</th><th>原因</th></tr></thead><tbody>' + rows + '</tbody></table>';
}

async function loadSettings() {
  var res = await safeGet('config');
  if (res && res.status === 'error') { toast('加载设置失败', 'error'); return; }
  CONFIG = Object.assign({}, CONFIG, res);
  renderToggles('settingsCore', CORE_TOGGLES);
  renderToggles('settingsAudit', AUDIT_TOGGLES);
  renderToggles('settingsLexicon', LEXICON_TOGGLES);
  renderToggles('settingsFeatures', FEATURE_TOGGLES);
  renderListSettings();
  renderExtraSettings();
}

function renderToggles(containerId, items) {
  var c = $('#' + containerId);
  c.innerHTML = items.map(function(item) {
    var checked = CONFIG[item.key] ? 'checked' : '';
    return '<div class="setting-item"><div class="setting-info"><div class="setting-label">' + esc(item.label) + '</div>' + (item.desc ? '<div class="setting-desc">' + esc(item.desc) + '</div>' : '') + '</div><label class="toggle"><input type="checkbox" data-key="' + item.key + '" ' + checked + ' /><span class="slider"></span></label></div>';
  }).join('');
}

function renderListSettings() {
  var c = $('#settingsLists');
  var whites = CONFIG._white_list || CONFIG.group_white_list || [];
  var blacks = CONFIG._black_list || CONFIG.group_black_list || [];
  var users = CONFIG._user_black_list || CONFIG.user_black_list || [];

  c.innerHTML =
    '<div class="list-section"><h3>群白名单</h3><div class="list-add-row"><input type="text" class="input-sm" id="addWhiteInput" placeholder="输入群号..." /><button class="btn btn-primary btn-sm" id="btnAddWhite">添加</button></div><div class="list-items" id="whiteItems">' + renderListTags(whites, 'white') + '</div></div>' +
    '<div class="list-section"><h3>群黑名单</h3><div class="list-add-row"><input type="text" class="input-sm" id="addBlackInput" placeholder="输入群号..." /><button class="btn btn-danger btn-sm" id="btnAddBlack">添加</button></div><div class="list-items" id="blackItems">' + renderListTags(blacks, 'black') + '</div></div>' +
    '<div class="list-section"><h3>用户黑名单</h3><div class="list-add-row"><input type="text" class="input-sm" id="addUserInput" placeholder="输入QQ号..." /><button class="btn btn-warning btn-sm" id="btnAddUser" style="background:var(--warning);color:#fff">添加</button></div><div class="list-items" id="userItems">' + renderListTags(users, 'user') + '</div></div>';

  $('#btnAddWhite').addEventListener('click', async function() {
    var val = $('#addWhiteInput').value.trim(); if (!val) return;
    await safePost('whitelist/add', { group_id: val });
    $('#addWhiteInput').value = '';
    toast('已添加到白名单', 'success');
    loadSettings();
  });
  $('#btnAddBlack').addEventListener('click', async function() {
    var val = $('#addBlackInput').value.trim(); if (!val) return;
    await safePost('blacklist/add', { group_id: val });
    $('#addBlackInput').value = '';
    toast('已添加到黑名单', 'danger');
    loadSettings();
  });
  $('#btnAddUser').addEventListener('click', async function() {
    var val = $('#addUserInput').value.trim(); if (!val) return;
    await safePost('user_blacklist/add', { user_id: val });
    $('#addUserInput').value = '';
    toast('已添加到用户黑名单', 'warning');
    loadSettings();
  });

  $$('.list-tag .btn-remove', c).forEach(function(btn) {
    btn.addEventListener('click', async function() {
      var type = btn.dataset.type;
      var val = btn.dataset.val;
      if (type === 'white') await safePost('whitelist/remove', { group_id: val });
      else if (type === 'black') await safePost('blacklist/remove', { group_id: val });
      else if (type === 'user') await safePost('user_blacklist/remove', { user_id: val });
      toast('已移除', 'success');
      loadSettings();
    });
  });
}

function renderListTags(list, type) {
  var cls = type === 'white' ? 'list-tag-white' : type === 'black' ? 'list-tag-black' : 'list-tag-user';
  if (!list.length) return '<span style="font-size:12px;color:#909399">暂无</span>';
  return list.map(function(v) {
    return '<span class="list-tag ' + cls + '">' + esc(String(v)) + '<button class="btn-remove" data-type="' + type + '" data-val="' + esc(String(v)) + '">&times;</button></span>';
  }).join('');
}

function renderExtraSettings() {
  var c = $('#settingsExtra');
  if (!c) return;
  var banDuration = CONFIG.moderation_ban_duration != null ? CONFIG.moderation_ban_duration : 1800;
  var providerId = CONFIG.moderation_llm_provider_id || '';
  var banNotice = CONFIG.ban_notice || '[群管] {name}({uid}) 的消息已被撤回（违规内容）';
  c.innerHTML =
    '<div class="setting-item"><div class="setting-info"><div class="setting-label">禁言时长（秒）</div><div class="setting-desc">违规用户自动禁言时长，默认 1800 秒（30分钟）</div></div><input type="number" class="input-sm" id="inputBanDuration" value="' + banDuration + '" min="60" max="2592000" style="width:100px" /></div>' +
    '<div class="setting-item"><div class="setting-info"><div class="setting-label">LLM Provider ID</div><div class="setting-desc">用于 AI 审核的 LLM 提供商 ID（留空使用默认）</div></div><input type="text" class="input-sm" id="inputProviderId" value="' + esc(providerId) + '" placeholder="留空使用默认" style="width:160px" /></div>' +
    '<div class="setting-item"><div class="setting-info"><div class="setting-label">封禁通知模板</div><div class="setting-desc">支持变量：{name} 用户名、{uid} QQ号、{group} 群号</div></div><input type="text" class="input-sm" id="inputBanNotice" value="' + esc(banNotice) + '" style="width:260px" /></div>';
}

async function saveSettings() {
  var payload = {};
  $$('input[data-key]').forEach(function(inp) {
    payload[inp.dataset.key] = inp.checked;
  });
  var banDuration = $('#inputBanDuration');
  if (banDuration) payload.moderation_ban_duration = parseInt(banDuration.value, 10) || 1800;
  var providerId = $('#inputProviderId');
  if (providerId) payload.moderation_llm_provider_id = providerId.value.trim();
  var banNotice = $('#inputBanNotice');
  if (banNotice) payload.ban_notice = banNotice.value.trim();
  var res = await safePost('config', payload);
  if (res && res.status === 'error') {
    toast('保存失败: ' + (res.message || ''), 'error');
  } else {
    toast('设置已保存', 'success');
  }
}

function init() {
  initTabs();

  $('#btnRefreshAll').addEventListener('click', loadOverview);
  $('#btnRefreshTodayStats').addEventListener('click', loadOverview);
  $('#btnRefreshGroups').addEventListener('click', loadGroups);
  $('#btnRefreshUsers').addEventListener('click', loadUsers);
  $('#btnRefreshLogs').addEventListener('click', loadLogs);
  $('#btnSaveSettings').addEventListener('click', saveSettings);
  $('#btnModalClose').addEventListener('click', closeModal);
  $('#modalOverlay').addEventListener('click', function(e) { if (e.target === e.currentTarget) closeModal(); });

  $('#btnBackGroups').addEventListener('click', function() {
    $('#memberPanel').style.display = 'none';
    var groupGrid = $('#groupGrid');
    if (groupGrid) { var card = groupGrid.closest('.card'); if (card) card.style.display = ''; }
    CURRENT_GROUP = null;
    CACHED_GROUP_ID = null;
    CURRENT_MEMBERS = [];
  });

  $('#searchGroupInput').addEventListener('input', function() {
    if (CONFIG._groups) renderGroups(CONFIG._groups);
  });
  $('#searchMemberInput').addEventListener('input', function() {
    if (CURRENT_MEMBERS.length) renderMembers(CURRENT_MEMBERS);
  });

  $('#btnAddAdmin').addEventListener('click', async function() {
    var val = $('#adminInput').value.trim();
    if (!val) return;
    await safePost('admin/add', { user_id: val });
    $('#adminInput').value = '';
    toast('已添加管理员', 'success');
    loadAdmins();
  });

  $('#btnBatchDelete').addEventListener('click', async function() {
    var ids = $$('.ck:checked').map(function(ck) { return ck.dataset.uid; });
    if (!ids.length) { toast('请先勾选用户', 'error'); return; }
    showModal('批量删除', '<p>确认删除所有记录？<br>将删除 ' + ids.length + ' 个用户的全部审核记录。</p>',
      '<button class="btn btn-ghost btn-sm" id="btnCancelBatchDelete">取消</button>' +
      '<button class="btn btn-danger btn-sm" id="btnConfirmBatchDelete">确认删除</button>'
    );
    $('#btnCancelBatchDelete').addEventListener('click', closeModal);
    $('#btnConfirmBatchDelete').addEventListener('click', async function() {
      var allRes = await safeGet('logs/export');
      if (allRes && allRes.status !== 'error') {
        var delIds = (allRes || []).filter(function(l) { return ids.indexOf(String(l.user_id)) !== -1; }).map(function(l) { return l.id; }).filter(function(id) { return id !== undefined && id !== null; });
        if (delIds.length) await safePost('logs/delete', { ids: delIds });
      }
      closeModal();
      toast('批量删除完成', 'success');
      loadUsers();
    });
  });

  $('#btnExport').addEventListener('click', async function() {
    var res = await safeGet('logs/export');
    if (res && res.status === 'error') { toast('导出失败', 'error'); return; }
    var data = res || [];
    if (!data.length) { toast('暂无数据可导出', 'error'); return; }
    var headers = Object.keys(data[0]);
    var csv = [headers.join(','), data.map(function(r) { return headers.map(function(h) { return '"' + String(r[h] != null ? r[h] : '').replace(/"/g, '""') + '"'; }).join(','); }).join('\n')].join('\n');
    var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'group_guardian_logs_' + new Date().toISOString().slice(0, 10) + '.csv';
    a.click(); URL.revokeObjectURL(url);
    toast('导出成功', 'success');
  });

  $('#statusDot').style.background = 'var(--success)';
  $('#statusText').textContent = '已连接';

  loadOverview();
  loadAdmins();
}

(async function() {
  bridge = window.AstrBotPluginPage;
  if (!bridge) {
    document.getElementById('statusText').textContent = 'Bridge 未加载';
    document.getElementById('statusDot').style.background = 'var(--danger)';
    return;
  }
  try {
    await bridge.ready();
    apiGet = bridge.apiGet.bind(bridge);
    apiPost = bridge.apiPost.bind(bridge);
    init();
  } catch(e) {
    document.getElementById('statusText').textContent = '初始化失败';
    document.getElementById('statusDot').style.background = 'var(--danger)';
  }
})();
  </script>
