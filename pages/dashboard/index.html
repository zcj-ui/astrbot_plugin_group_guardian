<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Group Guardian - QQ群智能守护者</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo-icon">G</div>
        <div class="logo-text">
          <span class="logo-title">Group Guardian</span>
          <span class="logo-ver" id="logoVer">v1.8.0</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" data-tab="overview">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
          <span>总览</span>
        </a>
        <a class="nav-item" data-tab="groups">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
          <span>群管理</span>
        </a>
        <a class="nav-item" data-tab="records">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
          <span>违规记录</span>
        </a>
        <a class="nav-item" data-tab="settings">
          <svg class="nav-icon" viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
          <span>设置</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-text" id="statusText">连接中...</span>
      </div>
    </aside>

    <main class="main-content">
      <!-- 总览 -->
      <div class="tab-panel active" id="tab-overview">
        <div class="page-header">
          <h1>总览</h1>
          <button class="btn btn-ghost" id="btnRefreshAll">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            刷新
          </button>
        </div>

        <div class="stats-row" id="statsRow">
          <div class="stat-card stat-primary">
            <div class="stat-icon">
              <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
            <div class="stat-body">
              <div class="stat-value" id="statTodayBlocked">--</div>
              <div class="stat-label">今日拦截</div>
            </div>
          </div>
          <div class="stat-card stat-info">
            <div class="stat-icon">
              <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            </div>
            <div class="stat-body">
              <div class="stat-value" id="statTodayTotal">--</div>
              <div class="stat-label">今日审核</div>
            </div>
          </div>
          <div class="stat-card stat-success">
            <div class="stat-icon">
              <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <div class="stat-body">
              <div class="stat-value" id="statTodayPassed">--</div>
              <div class="stat-label">今日放行</div>
            </div>
          </div>
          <div class="stat-card stat-warning">
            <div class="stat-icon">
              <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            </div>
            <div class="stat-body">
              <div class="stat-value" id="statWhiteCount">--</div>
              <div class="stat-label">白名单群</div>
            </div>
          </div>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-body">
              <div class="stat-value" id="statBlackCount">--</div>
              <div class="stat-label">黑名单群</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-body">
              <div class="stat-value" id="statUserBlackCount">--</div>
              <div class="stat-label">黑名单用户</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-body">
              <div class="stat-value" id="statAdminCount">--</div>
              <div class="stat-label">管理员</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-body">
              <div class="stat-value" id="statTotalLogs">--</div>
              <div class="stat-label">历史记录</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>今日拦截榜</h2>
            <button class="btn btn-ghost btn-sm" id="btnRefreshTodayStats">刷新</button>
          </div>
          <div class="ranking-container">
            <div class="ranking-section">
              <h3>群拦截排行</h3>
              <div id="groupRanking" class="ranking-list"><p class="empty">暂无数据</p></div>
            </div>
            <div class="ranking-section">
              <h3>用户违规排行</h3>
              <div id="userRanking" class="ranking-list"><p class="empty">暂无数据</p></div>
            </div>
          </div>
        </div>
      </div>

      <!-- 群管理 -->
      <div class="tab-panel" id="tab-groups">
        <div class="page-header">
          <h1>群管理</h1>
          <button class="btn btn-ghost" id="btnRefreshGroups">
            <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            刷新
          </button>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>群列表</h2>
            <div class="header-actions">
              <input type="text" class="input-sm" id="searchGroupInput" placeholder="搜索群号/群名..." />
            </div>
          </div>
          <div class="group-grid" id="groupGrid"><p class="empty">加载中...</p></div>
        </div>

        <div class="card" id="memberPanel" style="display:none">
          <div class="card-header">
            <div class="member-panel-title">
              <button class="btn btn-ghost btn-sm" id="btnBackGroups">
                <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                返回
              </button>
              <h2 id="memberPanelTitle">群成员</h2>
            </div>
            <div class="header-actions">
              <input type="text" class="input-sm" id="searchMemberInput" placeholder="搜索成员..." />
            </div>
          </div>
          <div class="member-stats" id="memberStats"></div>
          <div class="member-list" id="memberList"><p class="empty">加载中...</p></div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>插件管理员</h2>
          </div>
          <div class="admin-manage">
            <div class="admin-add-row">
              <input type="text" class="input-sm" id="adminInput" placeholder="输入QQ号添加管理员..." />
              <button class="btn btn-primary btn-sm" id="btnAddAdmin">添加</button>
            </div>
            <div class="admin-list" id="adminList"><p class="empty">暂无管理员</p></div>
          </div>
        </div>
      </div>

      <!-- 违规记录 -->
      <div class="tab-panel" id="tab-records">
        <div class="page-header">
          <h1>违规记录</h1>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>被撤回用户</h2>
            <div class="header-actions">
              <button class="btn btn-ghost btn-sm" id="btnRefreshUsers">刷新</button>
              <button class="btn btn-danger btn-sm" id="btnBatchDelete">批量删除</button>
              <button class="btn btn-ghost btn-sm" id="btnExport">导出CSV</button>
            </div>
          </div>
          <div class="user-container" id="userContainer"><p class="empty">暂无数据</p></div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>审核日志</h2>
            <button class="btn btn-ghost btn-sm" id="btnRefreshLogs">刷新</button>
          </div>
          <div class="log-container" id="logContainer"><p class="empty">暂无日志</p></div>
        </div>
      </div>

      <!-- 设置 -->
      <div class="tab-panel" id="tab-settings">
        <div class="page-header">
          <h1>设置</h1>
          <button class="btn btn-primary btn-sm" id="btnSaveSettings">保存更改</button>
        </div>

        <div class="settings-grid">
          <div class="card">
            <div class="card-header"><h2>核心设置</h2></div>
            <div class="settings-list" id="settingsCore"></div>
          </div>
          <div class="card">
            <div class="card-header"><h2>审核设置</h2></div>
            <div class="settings-list" id="settingsAudit"></div>
          </div>
          <div class="card">
            <div class="card-header"><h2>词库设置</h2></div>
            <div class="settings-list" id="settingsLexicon"></div>
          </div>
          <div class="card">
            <div class="card-header"><h2>功能开关</h2></div>
            <div class="settings-list" id="settingsFeatures"></div>
          </div>
          <div class="card card-full">
            <div class="card-header"><h2>高级设置</h2></div>
            <div class="settings-list" id="settingsExtra"></div>
          </div>
          <div class="card card-full">
            <div class="card-header"><h2>名单管理</h2></div>
            <div class="list-manage" id="settingsLists"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modalTitle">标题</h3>
        <button class="btn-close" id="btnModalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
